<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Membership | Vintology</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        .auth-wrapper {
            max-width: 450px;
            margin: 100px auto;
            padding: 20px;
        }
        .auth-box {
            background-color: var(--bg-charcoal);
            border: 1px solid #262626;
            padding: 40px;
        }
        .auth-box h3 {
            font-family: var(--font-serif);
            color: var(--accent-gold);
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-obsidian);
            border: 1px solid #333;
            color: white;
            font-family: var(--font-sans);
        }
        .form-group input:focus {
            border-color: var(--accent-gold);
            outline: none;
        }
        .auth-btn { width: 100%; margin-top: 10px; }
        .auth-switch {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .auth-switch a {
            color: var(--accent-gold);
            text-decoration: none;
            margin-left: 5px;
        }
        .auth-switch a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <!-- Replace the old logo div with this clean brand layout -->
<a href="index.html" class="logo-container">
    <div class="brand-logo-icon"></div>
    <span class="brand-title">Vintology</span>
</a>
        <nav class="nav-links"><a href="index.html">Return to Vault</a></nav>
    </header>

    <main class="auth-wrapper">
        <div class="auth-box">
            <h3>REGISTER</h3>
            <form onsubmit="alert('Membership requested. Private verification link sent to your inbox.'); window.location.href='login.html'; return false;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" required placeholder="Alexander Morgan">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" required placeholder="alex@vintageinvestor.com">
                </div>
                <div class="form-group">
                    <label>Secure Password</label>
                    <input type="password" required placeholder="Minimum 8 characters">
                </div>
                <button type="submit" class="btn btn-secondary auth-btn">REQUEST MEMBERSHIP</button>
            </form>
            <div class="auth-switch">
                Already registered? <a href="login.html">Log In</a>
            </div>
        </div>
    </main>

</body>
</html>
